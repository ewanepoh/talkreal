function speak(text,speed,cb){
  if(!window.speechSynthesis){if(cb)cb();return;}
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=speed||0.85;u.pitch=1.1;
  var setVoice=function(){
    var voices=window.speechSynthesis.getVoices();
    var fem=voices.find(function(v){
      return v.lang.indexOf('en')===0&&(v.name.indexOf('Samantha')>=0||v.name.indexOf('Karen')>=0||v.name.indexOf('Victoria')>=0||v.name.indexOf('Fiona')>=0||v.name.indexOf('female')>=0||v.name.indexOf('Female')>=0);
    });
    if(fem)u.voice=fem;
    if(cb)u.onend=cb;
    window.speechSynthesis.speak(u);
  };
  if(window.speechSynthesis.getVoices().length>0){setVoice();}
  else{window.speechSynthesis.onvoiceschanged=setVoice;}
}

function crowd(ok){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(ok){
      // Applause - multiple clap bursts
      for(var c=0;c<7;c++){
        (function(ci){
          var sz=Math.floor(ctx.sampleRate*0.07);
          var buf=ctx.createBuffer(1,sz,ctx.sampleRate);
          var d=buf.getChannelData(0);
          for(var i=0;i<sz;i++){var e=Math.exp(-i/(sz*0.12));d[i]=(Math.random()*2-1)*e*0.7;}
          var src=ctx.createBufferSource();
          var filt=ctx.createBiquadFilter();filt.type='bandpass';filt.frequency.value=1000+Math.random()*600;filt.Q.value=0.7;
          var g=ctx.createGain();
          src.buffer=buf;src.connect(filt);filt.connect(g);g.connect(ctx.destination);
          var t=ctx.currentTime+ci*0.12+Math.random()*0.03;
          g.gain.setValueAtTime(0,t);
          g.gain.linearRampToValueAtTime(0.55,t+0.01);
          g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
          src.start(t);src.stop(t+0.18);
        })(c);
      }
      // Crowd cheer noise
      var cbuf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*1.2),ctx.sampleRate);
      var cd=cbuf.getChannelData(0);
      for(var i=0;i<cd.length;i++){
        var t2=i/ctx.sampleRate;
        var env=t2<0.25?t2/0.25:Math.exp(-(t2-0.25)*2.5);
        cd[i]=(Math.random()*2-1)*env*0.35;
      }
      var cheer=ctx.createBufferSource();
      var cf=ctx.createBiquadFilter();cf.type='bandpass';cf.frequency.value=700;cf.Q.value=0.4;
      var cg=ctx.createGain();cg.gain.value=0.5;
      cheer.buffer=cbuf;cheer.connect(cf);cf.connect(cg);cg.connect(ctx.destination);
      cheer.start(ctx.currentTime+0.05);
      // Victory melody
      [523,659,784,1047].forEach(function(f,i){
        var o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=f;o.type='sine';
        g.gain.setValueAtTime(0,ctx.currentTime+0.5+i*0.11);
        g.gain.linearRampToValueAtTime(0.13,ctx.currentTime+0.5+i*0.11+0.04);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5+i*0.11+0.28);
        o.start(ctx.currentTime+0.5+i*0.11);
        o.stop(ctx.currentTime+0.5+i*0.11+0.32);
      });
    } else {
      // Crowd disappointment "Awww"
      var abuf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*0.9),ctx.sampleRate);
      var ad=abuf.getChannelData(0);
      for(var i=0;i<ad.length;i++){
        var t3=i/ctx.sampleRate;
        var env2=t3<0.08?t3/0.08:Math.exp(-(t3-0.08)*3.5);
        var mod=Math.sin(2*Math.PI*(280-t3*150)*t3);
        ad[i]=(Math.random()*0.25+mod*0.45)*env2*0.5;
      }
      var aw=ctx.createBufferSource();
      var af=ctx.createBiquadFilter();af.type='lowpass';af.frequency.value=550;
      var ag=ctx.createGain();ag.gain.value=0.5;
      aw.buffer=abuf;aw.connect(af);af.connect(ag);ag.connect(ctx.destination);
      aw.start(ctx.currentTime);
      // Sad notes
      [392,349,330,294].forEach(function(f,i){
        var o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=f;o.type='sine';
        g.gain.setValueAtTime(0,ctx.currentTime+i*0.13);
        g.gain.linearRampToValueAtTime(0.1,ctx.currentTime+i*0.13+0.04);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.13+0.3);
        o.start(ctx.currentTime+i*0.13);
        o.stop(ctx.currentTime+i*0.13+0.35);
      });
    }
  }catch(e){}
}

function jingle(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [440,554,659,880,1108].forEach(function(f,i){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+i*0.14);
      g.gain.linearRampToValueAtTime(0.18,ctx.currentTime+i*0.14+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.14+0.32);
      o.start(ctx.currentTime+i*0.14);
      o.stop(ctx.currentTime+i*0.14+0.38);
    });
  }catch(e){}
}

function div(style,html){
  var d=document.createElement('div');
  Object.assign(d.style,style);
  if(html!==undefined)d.innerHTML=html;
  return d;
}
function btn(style,html,onclick){
  var b=document.createElement('button');
  Object.assign(b.style,style);
  b.innerHTML=html;
  b.style.fontFamily='inherit';
  if(onclick)b.addEventListener('click',onclick);
  return b;
}
function inp(style,placeholder,val,onInput,onEnter){
  var i=document.createElement('input');
  Object.assign(i.style,style);
  i.placeholder=placeholder;
  if(val)i.value=val;
  if(onInput)i.addEventListener('input',onInput);
  if(onEnter)i.addEventListener('keydown',function(e){if(e.key==='Enter')onEnter();});
  return i;
}

      );

    pd.appendChild(grid);

        '<div style="font-size:11px;color:#78350f;line-height:1.5">'+w.tip+'</div>'+
      '</div>';
    card.appendChild(btn({width:'100%',background:'#111',color:'#fff',border:'none',borderRadius:'12px',padding:'12px',fontSize:'13px',fontWeight:'800',cursor:'pointer'},
      '&#128266; Reecouter Jessica',
      function(){window.speechSynthesis&&window.speechSynthesis.cancel();speak(w.en,u.level.speed);}
    ));
  }
  d.appendChild(card);

  // Nav buttons
  var nav=div({display:'flex',gap:'9px'});
  nav.appendChild(btn({flex:'1',background:'#f1f5f9',border:'none',borderRadius:'13px',padding:'12px',fontSize:'13px',fontWeight:'700',cursor:'pointer',opacity:wi===0?'0.3':'1'},'\u2190 Prec',function(){if(wi>0){S.wi--;S.wrev=false;S.wspoken=false;render();}}));
  nav.appendChild(btn({flex:'2',background:lesson.color,color:'#fff',border:'none',borderRadius:'13px',padding:'12px',fontSize:'13px',fontWeight:'700',cursor:'pointer',opacity:wi===lesson.words.length-1?'0.3':'1'},'Suivant \u2192',function(){if(wi<lesson.words.length-1){S.wi++;S.wrev=false;S.wspoken=false;render();}}));
  d.appendChild(nav);
  return d;
}

// ================================================================
// SCREEN: MIRROR
// ================================================================
function screenMirror(){
  var lesson=S.lesson,u=S.user,wi=S.wi;
  var w=lesson.words[wi];
  var phase=S.mph,res=S.mres;
  var d=div({padding:'22px 14px',background:'#f8fafc',minHeight:'100vh'});
  d.appendChild(backBtn(function(){S.screen='lmenu';S.mph='ready';S.mres=null;S.matt=0;S.mpassed=[];render();}));

  if(phase==='done'){
    d.appendChild(div({textAlign:'center',padding:'30px 0'},
      '<div style="font-size:66px">&#127897;</div>'+
      '<div style="font-size:22px;font-weight:900;margin:10px 0">Jessica est fiere de toi!</div>'+
      '<div style="background:linear-gradient(135deg,#080810,#0f172a);border-radius:16px;padding:14px 18px;max-width:290px;margin:0 auto 16px">'+
        '<div style="color:#ef4444;font-size:10px;font-weight:700;margin-bottom:4px">PROF JESSICA</div>'+
        '<div style="color:#94a3b8;font-size:12px;font-style:italic">'+S.mpassed.length+'/'+lesson.words.length+' phrases reussies. '+u.name+', you are becoming a real American speaker!</div>'+
      '</div>'
    ));
    d.appendChild(btn({background:lesson.color,color:'#fff',border:'none',borderRadius:'13px',padding:'14px 30px',fontSize:'14px',fontWeight:'800',cursor:'pointer',display:'block',margin:'0 auto'},'Retour &#127968;',function(){S.screen='lmenu';render();}));
    return d;
  }

  // Progress
  d.appendChild(div({textAlign:'center',marginBottom:'10px'},
    '<div style="font-size:10px;color:#94a3b8;margin-bottom:4px">Phrase '+(wi+1)+'/'+lesson.words.length+'</div>'
  ));
  d.appendChild(progressBar(wi,lesson.words.length,lesson.color));

  // Word display
  d.appendChild(div({background:'linear-gradient(135deg,#080810,#0f172a)',borderRadius:'18px',padding:'18px',textAlign:'center',margin:'12px 0 14px'},
    '<div style="font-size:10px;color:#475569;margin-bottom:5px;letter-spacing:1px">DIS EN AMERICAIN</div>'+
    '<div style="font-size:18px;font-weight:900;color:#fff;margin-bottom:7px">'+w.fr+'</div>'+
    '<div style="font-size:15px;color:'+lesson.color+';font-weight:700;margin-bottom:1px">'+w.en+'</div>'+
    '<div style="font-size:11px;color:#475569;font-style:italic">['+w.ph+']</div>'
  ));

  if(phase==='result'&&res){
    d.appendChild(div({background:'linear-gradient(135deg,#080810,#0f172a)',borderRadius:'12px',padding:'11px 14px',marginBottom:'9px'},
      '<div style="display:flex;gap:9px"><div style="font-size:20px">&#127897;</div>'+
      '<div><div style="color:#ef4444;font-size:9px;font-weight:700;margin-bottom:1px">JESSICA DIT:</div>'+
      '<div style="color:'+(res==='ok'?'#10b981':'#f59e0b')+';font-size:12px;font-weight:700">'+(res==='ok'?rnd(WIN):rnd(TRY))+'</div>'+
      (S.mtx?'<div style="color:#475569;font-size:10px;margin-top:1px">Tu as dit: "'+S.mtx+'"</div>':'')+
      '</div></div>'
    ));
    d.appendChild(div({background:res==='ok'?'#10b98112':'#f59e0b12',border:'2px solid '+(res==='ok'?'#10b981':'#f59e0b'),borderRadius:'13px',padding:'13px',textAlign:'center',marginBottom:'9px'},
      '<div style="font-size:34px;margin-bottom:3px">'+(res==='ok'?'&#9989;':'&#128260;')+'</div>'+
      '<div style="font-weight:800;font-size:15px;color:'+(res==='ok'?'#10b981':'#f59e0b')+'">'+(res==='ok'?'Parfait!':'Presque! Reessaie')+'</div>'
    ));
    d.appendChild(btn({width:'100%',background:res==='ok'?'#10b981':lesson.color,color:'#fff',border:'none',borderRadius:'12px',padding:'13px',fontSize:'14px',fontWeight:'800',cursor:'pointer'},
      res==='ok'?(wi+1>=lesson.words.length?'Terminer &#127937;':'Suivant &#8594;'):'Reessayer &#128260;',
      function(){
        if(res==='ok'){
          S.mpassed.push(wi);
          if(wi+1>=lesson.words.length)S.mph='done';
          else{S.wi++;S.mph='ready';S.mres=null;S.matt=0;}
        } else {S.matt++;S.mres=null;S.mph='ready';}
        render();
      }
    ));
  } else if(phase==='listening'){
    d.appendChild(div({textAlign:'center',padding:'18px',background:lesson.color+'10',borderRadius:'16px',border:'2px solid '+lesson.color,marginBottom:'11px'},
      '<div style="font-size:32px;margin-bottom:5px">&#128066;</div>'+
      '<div style="font-weight:800;font-size:14px;color:#111;margin-bottom:5px">Jessica t\'ecoute...</div>'+
      '<div style="display:flex;justify-content:center;gap:4px">'+'<div style="width:4px;height:20px;background:'+lesson.color+';border-radius:99px;animation:bounce 0.7s infinite alternate"></div>'.repeat(4)+'</div>'
    ));
  } else if(phase==='speaking'){
    d.appendChild(div({textAlign:'center',padding:'14px',background:'#f1f5f9',borderRadius:'14px',marginBottom:'11px'},
      '<div style="font-size:26px">&#128266;</div><div style="font-weight:700;font-size:12px;color:#111;margin-top:3px">Jessica parle...</div>'
    ));
  } else {
    // Ready
    if(S.matt>0){
      d.appendChild(div({background:'linear-gradient(135deg,#080810,#0f172a)',borderRadius:'11px',padding:'9px 13px',textAlign:'center',marginBottom:'10px'},
        '<div style="color:#ef4444;font-size:9px;font-weight:700;margin-bottom:1px">JESSICA:</div>'+
        '<div style="color:#94a3b8;font-size:11px;font-style:italic">Don\'t give up! Try: '+w.en+'</div>'
      ));
    }
    var micArea=div({display:'flex',flexDirection:'column',alignItems:'center',gap:'11px'});
    micArea.appendChild(btn({width:'86px',height:'86px',borderRadius:'50%',background:'linear-gradient(135deg,'+lesson.color+',#ec4899)',border:'none',cursor:'pointer',fontSize:'32px',boxShadow:'0 9px 26px '+lesson.color+'45',display:'flex',alignItems:'center',justifyContent:'center'},'&#127897;',startRec));
    micArea.appendChild(div({fontWeight:'800',fontSize:'14px',color:'#111',textAlign:'center'},'Appuie et parle!'));
    micArea.appendChild(div({fontSize:'11px',color:'#94a3b8',textAlign:'center'},'Dis: "'+w.en+'"'));
    micArea.appendChild(btn({background:'none',border:'1.5px solid '+lesson.color,borderRadius:'10px',padding:'6px 16px',fontSize:'11px',color:lesson.color,cursor:'pointer',fontWeight:'700'},
      '&#128266; Ecouter Jessica',
      function(){S.mph='speaking';render();setTimeout(function(){speak(w.en,u.level.speed,function(){S.mph='ready';render();});},100);}
    ));
    d.appendChild(micArea);
  }
  return d;
}

function startRec(){
  var lesson=S.lesson,u=S.user,wi=S.wi,w=lesson.words[wi];
  S.mph='listening';render();
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){S.mph='manual';render();return;}
  var got=false;
  try{
    var r=new SR();
    r.lang='en-US';r.continuous=false;r.interimResults=false;
    r.onresult=function(e){
      got=true;
      var said=e.results[0][0].transcript.toLowerCase().trim();
      var tw=w.en.toLowerCase().replace(/[^a-z\s]/g,'').split(' ').filter(Boolean);
      var sw=said.replace(/[^a-z\s]/g,'').split(' ').filter(Boolean);
      var m=tw.filter(function(t){return sw.some(function(s){return s.includes(t.slice(0,3))||t.includes(s.slice(0,3));});});
      var ok=m.length/Math.max(tw.length,1)>=0.45;
      S.mtx=said;S.mres=ok?'ok':'fail';S.mph='result';
      crowd(ok);render();
    };
    r.onerror=function(ev){got=true;S.mph=ev.error==='not-allowed'?'manual':'ready';render();};
    r.onend=function(){if(!got){S.mph='manual';render();}};
    r.start();
  }catch(ex){S.mph='manual';render();}
}

// ================================================================
// SCREEN: EXOS
// ================================================================
function screenExos(){
  var lesson=S.lesson,u=S.user,ei=S.ei;
  // Done screen
  if(ei>=lesson.ex.length){
    var pct=Math.round(S.escore/lesson.ex.length*100);
    var d=div({padding:'30px 18px',display:'flex',flexDirection:'column',alignItems:'center',gap:'13px',textAlign:'center',background:'#f8fafc',minHeight:'100vh'});
    d.innerHTML='<div style="font-size:58px">'+(pct===100?'&#127942;':pct>=80?'&#11088;':pct>=60?'&#128077;':'&#128170;')+'</div>'+
      '<div style="font-size:24px;font-weight:900">'+S.escore+'/'+lesson.ex.length+'</div>';
    d.appendChild(div({background:'linear-gradient(135deg,#080810,#0f172a)',borderRadius:'16px',padding:'14px 18px',maxWidth:'290px',width:'100%'},
      '<div style="color:#ef4444;font-size:10px;font-weight:700;margin-bottom:4px">PROF JESSICA</div>'+
      '<div style="color:#94a3b8;font-size:12px;font-style:italic">'+(pct===100?'"PERFECT '+u.name+'! You are on fire!!"':pct>=60?'"Well done '+u.name+'! Do the quiz to unlock the next lesson!"':'"Keep going '+u.name+'! Practice makes perfect!"')+'</div>'
    ));
    d.appendChild(btn({background:lesson.color,color:'#fff',border:'none',borderRadius:'13px',padding:'14px 30px',fontSize:'14px',fontWeight:'800',cursor:'pointer'},'Retour &#127968;',function(){S.screen='lmenu';render();}));
    return d;
  }

  var ex=lesson.ex[ei];
  var d=div({padding:'22px 14px',background:'#f8fafc',minHeight:'100vh'});
  d.appendChild(backBtn(function(){S.screen='lmenu';render();}));

  // Progress
  var ph=div({margin:'12px 0 14px'});
  ph.innerHTML='<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:#94a3b8">Exercice '+(ei+1)+'/'+lesson.ex.length+'</span><span style="font-size:11px;color:#94a3b8">&#9989; '+S.escore+' bons</span></div>';
  ph.appendChild(progressBar(ei,lesson.ex.length,lesson.color));
  d.appendChild(ph);

  // Jessica question
  d.appendChild(div({background:'linear-gradient(135deg,#080810,#0f172a)',borderRadius:'14px',padding:'12px 14px',marginBottom:'14px',display:'flex',gap:'9px'},
    '<div style="font-size:22px">&#127897;</div>'+
    '<div><div style="color:#ef4444;font-size:9px;font-weight:700;margin-bottom:1px">JESSICA:</div>'+
    '<div style="color:#94a3b8;font-size:12px;font-style:italic">"'+ex.q+'"</div></div>'
  ));

  // FILL
  if(ex.t==='fill'){
    var parts=ex.q.split('___');
    var fillDiv=div({background:'#f1f5f9',borderRadius:'13px',padding:'16px',textAlign:'center',marginBottom:'9px'});
    fillDiv.innerHTML='<div style="font-size:17px;font-weight:800;color:#111;line-height:1.6">'+
      parts[0]+'<span style="border-bottom:3px solid '+lesson.color+';padding:1px 8px;color:'+(S.echk?(S.ecor?'#10b981':'#ef4444'):'#111')+';font-style:italic">'+
      (S.echk?(S.ecor?S.einp||ex.a:S.einp||'___'):(S.einp||'___'))+'</span>'+(parts[1]||'')+
      '</div><div style="font-size:10px;color:#cbd5e1;margin-top:5px">Phonetique: ['+ex.h+']</div>';
    d.appendChild(fillDiv);
    if(!S.echk){
      var fi=inp({width:'100%',padding:'12px 14px',fontSize:'15px',fontWeight:'700',borderRadius:'12px',border:'2px solid #e2e8f0',outline:'none',textAlign:'center',color:'#111',boxSizing:'border-box',marginBottom:'9px',display:'block'},'Tape ta reponse... ['+ex.h+']',S.einp,
        function(){S.einp=this.value;},
        doCheck
      );
      d.appendChild(fi);
      setTimeout(function(){if(fi&&fi.focus)fi.focus();},100);
    }
  }
  // TRANS
  else if(ex.t==='trans'){
    d.appendChild(div({background:'linear-gradient(135deg,#080810,#0f172a)',borderRadius:'13px',padding:'16px',textAlign:'center',marginBottom:'9px'},
      '<div style="font-size:10px;color:#475569;margin-bottom:5px;letter-spacing:1px">TRADUIS EN AMERICAIN</div>'+
      '<div style="font-size:18px;font-weight:900;color:#fff">'+ex.q+'</div>'+
      '<div style="font-size:10px;color:#334155;margin-top:3px">['+ex.h+']</div>'
    ));
    if(!S.echk){
      var ti=inp({width:'100%',padding:'12px 14px',fontSize:'14px',fontWeight:'700',borderRadius:'12px',border:'2px solid #e2e8f0',outline:'none',textAlign:'center',color:'#111',boxSizing:'border-box',marginBottom:'9px',display:'block'},'Ta traduction... ['+ex.h+']',S.einp,
        function(){S.einp=this.value;},
        doCheck
      );
      d.appendChild(ti);
      setTimeout(function(){if(ti&&ti.focus)ti.focus();},100);
    }
  }
  // PICK
  else if(ex.t==='pick'){
    var opts=div({display:'flex',flexDirection:'column',gap:'8px',marginBottom:'13px'});
    ex.o.forEach(function(opt){
      var isA=opt===ex.a,isCh=opt===S.echo;
      opts.appendChild(btn({
        background:S.echk?(isA?'#10b981':isCh?'#ef4444':'#f1f5f9'):(isCh?'#111':'#fff'),
        color:S.echk&&(isA||isCh)?'#fff':isCh?'#fff':'#111',
        border:'2px solid '+(S.echk?(isA?'#10b981':isCh?'#ef4444':'#e2e8f0'):(isCh?'#111':'#e2e8f0')),
        borderRadius:'12px',padding:'12px 14px',fontSize:'13px',fontWeight:'700',
        cursor:S.echk?'default':'pointer',textAlign:'center',width:'100%'
      },opt,function(){if(!S.echk){S.echo=opt;render();}}));
    });
    d.appendChild(opts);
  }

  // Jessica feedback after check
  if(S.echk){
    d.appendChild(div({background:'linear-gradient(135deg,#080810,#0f172a)',borderRadius:'12px',padding:'11px 13px',marginBottom:'9px',display:'flex',gap:'9px'},
      '<div style="font-size:18px">&#127897;</div>'+
      '<div><div style="color:#ef4444;font-size:9px;font-weight:700;margin-bottom:1px">JESSICA CORRIGE:</div>'+
      '<div style="color:'+(S.ecor?'#10b981':'#f59e0b')+';font-size:12px;font-weight:700">'+(S.ecor?'Perfect! Exactly right!':'La bonne reponse: "'+ex.a+'"')+'</div></div>'
    ));
    d.appendChild(btn({width:'100%',background:S.ecor?'#10b981':lesson.color,color:'#fff',border:'none',borderRadius:'12px',padding:'13px',fontSize:'14px',fontWeight:'800',cursor:'pointer'},
      ei+1>=lesson.ex.length?'Voir resultats &#127937;':'Exercice suivant &#8594;',
      function(){S.ei++;S.einp='';S.echo=null;S.echk=false;S.ecor=false;render();}
    ));
  } else {
    d.appendChild(btn({width:'100%',background:(ex.t==='pick'?S.echo:S.einp)?lesson.color:'#e2e8f0',color:(ex.t==='pick'?S.echo:S.einp)?'#fff':'#94a3b8',border:'none',borderRadius:'12px',padding:'13px',fontSize:'14px',fontWeight:'800',cursor:(ex.t==='pick'?S.echo:S.einp)?'pointer':'not-allowed'},
      'Valider &#10003;',doCheck
    ));
  }
  return d;

  function doCheck(){
    var ans=ex.t==='pick'?S.echo:(S.einp||'').trim().toLowerCase();
    if(!ans)return;
    var ok=ans===ex.a.toLowerCase()||ans.replace(/[!?,.]/g,'')===ex.a.toLowerCase().replace(/[!?,.]/g,'');
    S.ecor=ok;S.echk=true;
    crowd(ok);
    if(ok)S.escore++;
    render();
  }
}

// ================================================================
// SCREEN: QUIZ
// ================================================================
function screenQuiz(){
  var lesson=S.lesson,u=S.user,qi=S.qi;

  if(S.qdone){
    var pct=Math.round(S.qscore/lesson.words.length*100);
    var ok=pct>=60;
    var d=div({padding:'26px',display:'flex',flexDirection:'column',alignItems:'center',gap:'13px',textAlign:'center',background:'#f8fafc',minHeight:'100vh'});
    d.innerHTML='<div style="font-size:60px">'+(pct===100?'&#127942;':pct>=80?'&#11088;':ok?'&#128077;':'&#128170;')+'</div>'+
      '<div style="font-size:24px;font-weight:900">'+S.qscore+'/'+lesson.words.length+'</div>';
    d.appendChild(div({background:'linear-gradient(135deg,#080810,#0f172a)',borderRadius:'16px',padding:'14px 18px',maxWidth:'290px',width:'100%'},
      '<div style="color:#ef4444;font-size:10px;font-weight:700;margin-bottom:4px">PROF JESSICA</div>'+
      '<div style="color:#94a3b8;font-size:12px;font-style:italic">'+(pct===100?'"PERFECT '+u.name+'! LEGENDARY!!"':ok?'"Well done '+u.name+'! Lesson '+lesson.id+' done! Next one is unlocked!"':'"Keep going '+u.name+'! You need 60 percent to pass. I believe in you!"')+'</div>'
    ));
    if(ok){
      d.appendChild(btn({background:lesson.color,color:'#fff',border:'none',borderRadius:'13px',padding:'14px 30px',fontSize:'14px',fontWeight:'800',cursor:'pointer'},'+'+lesson.xp+' XP - Suivante &#128640;',function(){
        if(!S.done.includes(lesson.id))S.done.push(lesson.id);
        S.user.xp+=lesson.xp;
        showXPPop(lesson.xp);
        S.screen='home';render();
      }));
    } else {
      d.appendChild(btn({background:'#111',color:'#fff',border:'none',borderRadius:'13px',padding:'14px 30px',fontSize:'14px',fontWeight:'800',cursor:'pointer'},'Reessayer &#128260;',function(){S.qi=0;S.qscore=0;S.qcho=null;S.qdone=false;render();}));
    }
    d.appendChild(btn({background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:'13px',marginTop:'4px'},'Retour',function(){S.screen='lmenu';render();}));
    return d;
  }

  var w=lesson.words[qi];
  var opts=shuffle([w.en,...shuffle(lesson.words.filter(function(x){return x.en!==w.en;})).slice(0,3).map(function(x){return x.en;})]).slice(0,4);

  var d=div({padding:'22px 14px',background:'#f8fafc',minHeight:'100vh'});
  d.appendChild(backBtn(function(){S.screen='lmenu';render();}));

  var ph=div({margin:'11px 0 13px'});
  ph.innerHTML='<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:#94a3b8">Quiz final</span><span style="font-size:11px;color:#94a3b8">'+(qi+1)+'/'+lesson.words.length+'</span></div>';
  ph.appendChild(progressBar(qi,lesson.words.length,lesson.color));
  d.appendChild(ph);

  d.appendChild(div({background:'linear-gradient(135deg,#080810,#0f172a)',borderRadius:'20px',padding:'20px',textAlign:'center',marginBottom:'16px'},
    '<div style="font-size:10px;color:#475569;margin-bottom:5px;letter-spacing:1px">TRADUIS EN AMERICAIN</div>'+
    '<div style="font-size:20px;font-weight:900;color:#fff">'+w.fr+'</div>'
  ));

  var grid=div({display:'grid',gridTemplateColumns:'1fr 1fr',gap:'9px'});
  opts.forEach(function(c){
    var ok=c===w.en;
    grid.appendChild(btn({
      background:S.qcho?(ok?'#10b981':c===S.qcho?'#ef4444':'#f1f5f9'):'#fff',
      color:S.qcho&&(ok||c===S.qcho)?'#fff':'#111',
      border:'2px solid '+(S.qcho?(ok?'#10b981':c===S.qcho?'#ef4444':'#e2e8f0'):'#e2e8f0'),
      borderRadius:'13px',padding:'13px 7px',fontSize:'12px',fontWeight:'700',
      cursor:S.qcho?'default':'pointer',lineHeight:'1.3',textAlign:'center'
    },c,function(){
      if(S.qcho)return;
      S.qcho=c;
      crowd(ok);
      if(ok){S.qscore++;speak(w.en,u.level.speed);}
      render();
      setTimeout(function(){
        if(qi+1>=lesson.words.length)S.qdone=true;
        else{S.qi++;S.qcho=null;}
        render();
      },1000);
    }));
  });
  d.appendChild(grid);
  return d;
}

// ================================================================
// XP POPUP
// ================================================================
function showXPPop(xp){
  var pop=document.createElement('div');
  pop.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:9999;animation:fadeUp 0.3s ease';
  pop.innerHTML='<div style="background:linear-gradient(135deg,#080810,#0f172a);border:1px solid rgba(239,68,68,0.3);border-radius:26px;padding:40px 48px;text-align:center;animation:pop 0.4s ease">'+
    '<div style="font-size:52px">&#11088;</div>'+
    '<div style="font-size:32px;font-weight:900;color:#fff;margin:7px 0 3px">+'+xp+' XP</div>'+
    '<div style="color:#ef4444;font-size:13px;font-weight:700">Lecon validee!</div>'+
    '<div style="color:#475569;font-size:11px;margin-top:3px;font-style:italic">Jessica est fiere de toi!</div>'+
  '</div>';
  document.body.appendChild(pop);
  crowd(true);
  setTimeout(function(){document.body.removeChild(pop);},2800);
}

// ================================================================
// START
// ================================================================
render();
</script>
