function qs(id){return document.getElementById(id);}
function ce(tag,attrs,inner){
  var el=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(k=>{ if(k==='style')Object.assign(el.style,attrs[k]); else if(k==='onclick')el.addEventListener('click',attrs[k]); else el.setAttribute(k,attrs[k]); });
  if(inner!==undefined)el.innerHTML=inner;
  return el;
}

function getXL(xp){var l=XP_LVS[0];XP_LVS.forEach(v=>{if(xp>=v.min)l=v;});return l;}
function getNX(xp){for(var i=XP_LVS.length-1;i>=0;i--){if(xp>=XP_LVS[i].min)return XP_LVS[Math.min(i+1,XP_LVS.length-1)];}return XP_LVS[1];}
function getBadges(user,done){
  var b=[];
  if(done.length>=1)b.push('first');
  if(user.streak>=3)b.push('s3');
  if(user.streak>=7)b.push('s7');
  if(user.xp>=100)b.push('xp100');
  if(user.xp>=500)b.push('xp500');
  if(user.xp>=1000)b.push('xp1000');
  if(done.length>=5)b.push('l5');
  if(done.length>=10)b.push('l10');
  if(done.length>=20)b.push('l20');
  return b;
}
function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}
function rnd(a){return a[Math.floor(Math.random()*a.length)];}

const TRY=['Not quite - but you are close!','Almost! Listen one more time.','Keep going - you got this!'];

function speak(text,speed,cb){
  if(!window.speechSynthesis){if(cb)cb();return;}
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=speed||0.85;
  if(cb)u.onend=cb;
  window.speechSynthesis.speak(u);
}

function tone(ok){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(ok){
      [520,780,1040].forEach((f,i)=>{
        var o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=f;g.gain.setValueAtTime(0.2,ctx.currentTime+i*0.12);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.3);
        o.start(ctx.currentTime+i*0.12);o.stop(ctx.currentTime+i*0.12+0.35);
      });
    }else{
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.setValueAtTime(280,ctx.currentTime);
      o.frequency.setValueAtTime(200,ctx.currentTime+0.15);
      g.gain.setValueAtTime(0.2,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
      o.start();o.stop(ctx.currentTime+0.4);
    }
  }catch(e){}
}

function jingle(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [440,554,659,880,1108].forEach((f,i)=>{
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+i*0.14);
      g.gain.linearRampToValueAtTime(0.18,ctx.currentTime+i*0.14+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.14+0.32);
      o.start(ctx.currentTime+i*0.14);o.stop(ctx.currentTime+i*0.14+0.38);
    });
  }catch(e){}
}

      '<div><div style="color:#ef4444;font-size:9px;font-weight:700;margin-bottom:1px">SAM DIT:</div>'+
      '<div style="color:'+(res==='ok'?'#10b981':'#f59e0b')+';font-size:12px;font-weight:700">'+(res==='ok'?rnd(WIN):rnd(TRY))+'</div>'+
      (S.mirTx?'<div style="color:#475569;font-size:10px;margin-top:1px">Tu as dit: "'+S.mirTx+'"</div>':'')+
      '</div></div>'+
      '<div style="background:'+(res==='ok'?'#10b98112':'#f59e0b12')+';border:2px solid '+(res==='ok'?'#10b981':'#f59e0b')+';border-radius:13px;padding:13px;text-align:center;margin-bottom:9px">'+
        '<div style="font-size:34px;margin-bottom:3px">'+(res==='ok'?'&#9989;':'&#128260;')+'</div>'+
        '<div style="font-weight:800;font-size:15px;color:'+(res==='ok'?'#10b981':'#f59e0b')+'">'+(res==='ok'?'Parfait!':'Presque! Reessaie')+'</div>'+
      '</div>';
    var nb=ce('button',{style:{width:'100%',background:res==='ok'?'#10b981':lesson.color,color:'#fff',border:'none',borderRadius:'12px',padding:'13px',fontSize:'14px',fontWeight:'800',cursor:'pointer'},onclick:function(){
      if(res==='ok'){S.mirPassed.push(wi);if(wi+1>=lesson.words.length){S.mirPhase='done';}else{S.wiIdx++;S.mirPhase='ready';S.mirRes=null;S.mirAtt=0;}}
      else{S.mirAtt++;S.mirRes=null;S.mirPhase='ready';}
      render();
    }},res==='ok'?(wi+1>=lesson.words.length?'Terminer &#127937;':'Suivant &#8594;'):'Reessayer &#128260;');
    d.appendChild(nb);
  } else if(phase==='listening'){
    d.innerHTML+='<div style="text-align:center;padding:18px;background:'+lesson.color+'10;border-radius:16px;border:2px solid '+lesson.color+';margin-bottom:11px">'+
      '<div style="font-size:32px;margin-bottom:5px">&#128066;</div>'+
      '<div style="font-weight:800;font-size:14px;color:#111;margin-bottom:5px">Sam t\'ecoute...</div>'+
      '<div style="display:flex;justify-content:center;gap:4px">'+'<div style="width:4px;height:20px;background:'+lesson.color+';border-radius:99px;animation:bounce 0.7s 0s infinite alternate"></div>'.repeat(4)+'</div>'+
    '</div>';
  } else if(phase==='speaking'){
    d.innerHTML+='<div style="text-align:center;padding:14px;background:#f1f5f9;border-radius:14px;margin-bottom:11px">'+
      '<div style="font-size:26px">&#128266;</div><div style="font-weight:700;font-size:12px;color:#111;margin-top:3px">Sam parle ('+u.level.reps+'x)...</div>'+
    '</div>';
  } else {
    if(S.mirAtt>0)d.innerHTML+='<div style="background:linear-gradient(135deg,#080810,#0f172a);border-radius:11px;padding:9px 13px;text-align:center;margin-bottom:10px;width:100%"><div style="color:#ef4444;font-size:9px;font-weight:700;margin-bottom:1px">SAM:</div><div style="color:#94a3b8;font-size:11px;font-style:italic">Don\'t give up! Try: '+w.en+'</div></div>';
    var micBtn=ce('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'11px'}});
    var mb=ce('button',{style:{width:'86px',height:'86px',borderRadius:'50%',background:'linear-gradient(135deg,'+lesson.color+',#ec4899)',border:'none',cursor:'pointer',fontSize:'32px',boxShadow:'0 9px 26px '+lesson.color+'45',display:'flex',alignItems:'center',justifyContent:'center'},onclick:startRec},'&#127897;');
    micBtn.innerHTML='<div style="font-weight:800;font-size:14px;color:#111">Appuie et parle!</div><div style="font-size:11px;color:#94a3b8">Dis: "'+w.en+'"</div>';
    micBtn.insertBefore(mb,micBtn.firstChild);
    var lisBtn=ce('button',{style:{background:'none',border:'1.5px solid '+lesson.color,borderRadius:'10px',padding:'6px 16px',fontSize:'11px',color:lesson.color,cursor:'pointer',fontWeight:'700'},onclick:function(){
      S.mirPhase='speaking';render();
      setTimeout(function(){var c=0;var nx=function(){c++;speak(w.en,u.level.speed,function(){if(c<u.level.reps)setTimeout(nx,500);else{S.mirPhase='ready';render();}});};nx();},100);
    }},'&#128266; Ecouter x'+u.level.reps);
    micBtn.appendChild(lisBtn);
    d.appendChild(micBtn);
  }
  return d;
}

function startRec(){
  var lesson=S.lesson,u=S.user,wi=S.wiIdx,w=lesson.words[wi];
  S.mirPhase='listening';render();
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){S.mirPhase='manual';render();return;}
  var got=false;
  try{
    var r=new SR();
    r.lang='en-US';r.continuous=false;r.interimResults=false;
    r.onresult=function(e){
      got=true;
      var said=e.results[0][0].transcript.toLowerCase().trim();
      var tw=w.en.toLowerCase().replace(/[^a-z\s]/g,'').split(' ').filter(Boolean);
      var sw=said.replace(/[^a-z\s]/g,'').split(' ').filter(Boolean);
      var m=tw.filter(t=>sw.some(s=>s.includes(t.slice(0,3))||t.includes(s.slice(0,3))));
      S.mirTx=said;S.mirRes=m.length/Math.max(tw.length,1)>=0.45?'ok':'fail';
      S.mirPhase='result';tone(S.mirRes==='ok');render();
    };
    r.onerror=function(e){got=true;S.mirPhase=e.error==='not-allowed'?'manual':'ready';render();};
    r.onend=function(){if(!got){S.mirPhase='manual';render();}};
    r.start();
  }catch(e){S.mirPhase='manual';render();}
}

function renderExos(){
  var lesson=S.lesson,u=S.user,ei=S.exIdx;
  var ex=lesson.ex[ei];
  if(ei>=lesson.ex.length){
    // Done
    var sc=S.exScore||0;
    var pct=Math.round(sc/lesson.ex.length*100);
    var d=ce('div',{style:{padding:'30px 18px',display:'flex',flexDirection:'column',alignItems:'center',gap:'13px',textAlign:'center',background:'#f8fafc',minHeight:'100vh'}});
    d.innerHTML='<div style="font-size:58px">'+(pct===100?'&#127942;':pct>=80?'&#11088;':pct>=60?'&#128077;':'&#128170;')+'</div>'+
      '<div style="font-size:24px;font-weight:900">'+sc+'/'+lesson.ex.length+'</div>'+
      '<div style="background:linear-gradient(135deg,#080810,#0f172a);border-radius:16px;padding:14px 18px;max-width:290px;width:100%">'+
        '<div style="color:#ef4444;font-size:10px;font-weight:700;margin-bottom:4px">PROF SAM</div>'+
        '<div style="color:#94a3b8;font-size:12px;font-style:italic">'+(pct===100?'"PERFECT '+u.name+'! 100 percent! You are on fire!"':pct>=60?'"Well done '+u.name+'! Do the quiz to unlock the next lesson!"':'"Keep going '+u.name+'! Practice makes perfect!"')+'</div>'+
      '</div>'+
      '<button id="exDoneBtn" style="background:'+lesson.color+';color:#fff;border:none;border-radius:13px;padding:14px 30px;font-size:14px;font-weight:800;cursor:pointer">Retour &#127968;</button>';
    setTimeout(function(){var b=qs('exDoneBtn');if(b)b.addEventListener('click',function(){S.screen='lmenu';render();});},50);
    return d;
  }
  var d=ce('div',{style:{padding:'22px 14px',background:'#f8fafc',minHeight:'100vh'}});
  d.innerHTML='<button onclick="S.screen=\'lmenu\';S.exIdx=0;S.exScore=0;S.exInp=\'\';S.exCho=null;S.exChk=false;render();" style="background:none;border:none;color:#94a3b8;font-size:14px;cursor:pointer;padding:0;margin-bottom:4px">&#8592; Retour</button>';
  d.innerHTML+='<div style="margin:12px 0 14px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:#94a3b8">Exercice '+(ei+1)+'/'+lesson.ex.length+'</span><span style="font-size:11px;color:#94a3b8">&#9989; '+(S.exScore||0)+' bons</span></div>'+
    '<div style="height:4px;background:#e2e8f0;border-radius:99px"><div style="height:100%;width:'+(ei/lesson.ex.length*100)+'%;background:'+lesson.color+';border-radius:99px;transition:width 0.3s"></div></div></div>'+
    '<div style="background:linear-gradient(135deg,#080810,#0f172a);border-radius:14px;padding:12px 14px;margin-bottom:14px;display:flex;gap:9px">'+
      '<div style="font-size:22px">&#127897;</div>'+
      '<div><div style="color:#ef4444;font-size:9px;font-weight:700;margin-bottom:1px">SAM:</div>'+
      '<div style="color:#94a3b8;font-size:12px;font-style:italic">"'+ex.q+'"</div></div>'+
    '</div>';

  if(ex.t==='fill'){
    var fillQ=ex.q.replace('___','<span id="fillSlot" style="border-bottom:3px solid '+lesson.color+';padding:1px 8px;font-style:italic;color:'+(S.exChk?(S.exCor?'#10b981':'#ef4444'):'#111')+'">'+(S.exChk?(S.exCor||S.exInp||'___'):(S.exInp||'___'))+'</span>');
    d.innerHTML+='<div style="background:#f1f5f9;border-radius:13px;padding:16px;text-align:center;margin-bottom:9px"><div style="font-size:17px;font-weight:800;color:#111;line-height:1.6">'+fillQ+'</div><div style="font-size:10px;color:#cbd5e1;margin-top:5px">Phonetique: ['+ex.h+']</div></div>';
    if(!S.exChk){
      var inp=ce('input',{id:'exFillInp',placeholder:'Tape ta reponse... ['+ex.h+']',style:{width:'100%',padding:'12px 14px',fontSize:'15px',fontWeight:'700',borderRadius:'12px',border:'2px solid #e2e8f0',outline:'none',textAlign:'center',color:'#111',boxSizing:'border-box',marginBottom:'9px',display:'block'}});
      inp.value=S.exInp||'';
      inp.addEventListener('input',function(){S.exInp=this.value;});
      inp.addEventListener('keydown',function(e){if(e.key==='Enter')doExCheck();});
      d.appendChild(inp);
    }
  } else if(ex.t==='trans'){
    d.innerHTML+='<div style="background:linear-gradient(135deg,#080810,#0f172a);border-radius:13px;padding:16px;text-align:center;margin-bottom:9px">'+
      '<div style="font-size:10px;color:#475569;margin-bottom:5px;letter-spacing:1px">TRADUIS EN AMERICAIN</div>'+
      '<div style="font-size:18px;font-weight:900;color:#fff">'+ex.q+'</div>'+
      '<div style="font-size:10px;color:#334155;margin-top:3px">['+ex.h+']</div></div>';
    if(!S.exChk){
      var inp=ce('input',{id:'exTransInp',placeholder:'Ta traduction... ['+ex.h+']',style:{width:'100%',padding:'12px 14px',fontSize:'14px',fontWeight:'700',borderRadius:'12px',border:'2px solid #e2e8f0',outline:'none',textAlign:'center',color:'#111',boxSizing:'border-box',marginBottom:'9px',display:'block'}});
      inp.value=S.exInp||'';
      inp.addEventListener('input',function(){S.exInp=this.value;});
      inp.addEventListener('keydown',function(e){if(e.key==='Enter')doExCheck();});
      d.appendChild(inp);
    }
  } else if(ex.t==='pick'){
    var opts=ce('div',{style:{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'13px'}});
    ex.o.forEach(function(opt){
      var isA=opt===ex.a,isCh=opt===S.exCho;
      var btn=ce('button',{style:{background:S.exChk?(isA?'#10b981':isCh?'#ef4444':'#f1f5f9'):(isCh?'#111':'#fff'),color:S.exChk&&(isA||isCh)?'#fff':isCh?'#fff':'#111',border:'2px solid '+(S.exChk?(isA?'#10b981':isCh?'#ef4444':'#e2e8f0'):(isCh?'#111':'#e2e8f0')),borderRadius:'12px',padding:'12px 14px',fontSize:'13px',fontWeight:'700',cursor:S.exChk?'default':'pointer',textAlign:'center',width:'100%'},onclick:function(){if(!S.exChk){S.exCho=opt;render();}}},opt);
      opts.appendChild(btn);
    });
    d.appendChild(opts);
  }

  if(S.exChk){
    d.innerHTML+='<div style="background:linear-gradient(135deg,#080810,#0f172a);border-radius:12px;padding:11px 13px;margin-bottom:9px;display:flex;gap:9px">'+
      '<div style="font-size:18px">&#127897;</div>'+
      '<div><div style="color:#ef4444;font-size:9px;font-weight:700;margin-bottom:1px">SAM CORRIGE:</div>'+
      '<div style="color:'+(S.exCor?'#10b981':'#f59e0b')+';font-size:12px;font-weight:700">'+(S.exCor?'Perfect! Exactly right!':'La bonne reponse: "'+ex.a+'"')+'</div></div>'+
    '</div>';
    var nb=ce('button',{style:{width:'100%',background:S.exCor?'#10b981':lesson.color,color:'#fff',border:'none',borderRadius:'12px',padding:'13px',fontSize:'14px',fontWeight:'800',cursor:'pointer'},onclick:function(){
      S.exIdx++;S.exInp='';S.exCho=null;S.exChk=false;S.exCor=false;render();
    }},ei+1>=lesson.ex.length?'Voir resultats &#127937;':'Exercice suivant &#8594;');
    d.appendChild(nb);
  } else {
    var vb=ce('button',{id:'valBtn',style:{width:'100%',background:(ex.t==='pick'?S.exCho:S.exInp)?lesson.color:'#e2e8f0',color:(ex.t==='pick'?S.exCho:S.exInp)?'#fff':'#94a3b8',border:'none',borderRadius:'12px',padding:'13px',fontSize:'14px',fontWeight:'800',cursor:(ex.t==='pick'?S.exCho:S.exInp)?'pointer':'not-allowed'},onclick:doExCheck},'Valider &#10003;');
    d.appendChild(vb);
  }
  return d;
}

function doExCheck(){
  var lesson=S.lesson,ei=S.exIdx,ex=lesson.ex[ei];
  var ans=ex.t==='pick'?S.exCho:(S.exInp||'').trim().toLowerCase();
  var ok=ans===ex.a.toLowerCase()||ans.replace(/[!?,.]/g,'')===ex.a.toLowerCase().replace(/[!?,.]/g,'');
  S.exCor=ok;S.exChk=true;tone(ok);
  if(ok){S.exScore=(S.exScore||0)+1;}
  render();
}

function renderQuiz(){
  var lesson=S.lesson,u=S.user,qi=S.qIdx;
  if(S.qDone){
    var pct=Math.round(S.qScore/lesson.words.length*100);
    var ok=pct>=60;
    var d=ce('div',{style:{padding:'26px',display:'flex',flexDirection:'column',alignItems:'center',gap:'13px',textAlign:'center',background:'#f8fafc',minHeight:'100vh'}});
    d.innerHTML='<div style="font-size:60px">'+(pct===100?'&#127942;':pct>=80?'&#11088;':ok?'&#128077;':'&#128170;')+'</div>'+
      '<div style="font-size:24px;font-weight:900">'+S.qScore+'/'+lesson.words.length+'</div>'+
      '<div style="background:linear-gradient(135deg,#080810,#0f172a);border-radius:16px;padding:14px 18px;max-width:290px;width:100%">'+
        '<div style="color:#ef4444;font-size:10px;font-weight:700;margin-bottom:4px">PROF SAM</div>'+
        '<div style="color:#94a3b8;font-size:12px;font-style:italic">'+(pct===100?'"PERFECT '+u.name+'! LEGENDARY!"':ok?'"Well done '+u.name+'! Lesson '+lesson.id+' done! Next one unlocked!"':'"Keep going '+u.name+'! You need 60 percent to pass. I believe in you!"')+'</div>'+
      '</div>';
    if(ok){
      var xpBtn=ce('button',{style:{background:lesson.color,color:'#fff',border:'none',borderRadius:'13px',padding:'14px 30px',fontSize:'14px',fontWeight:'800',cursor:'pointer'},onclick:function(){
        if(!S.done.includes(lesson.id))S.done.push(lesson.id);
        S.user.xp+=lesson.xp;
        showXPPopup(lesson.xp);
        S.screen='home';render();
      }},'+'+lesson.xp+' XP - Suivante &#128640;');
      d.appendChild(xpBtn);
    } else {
      var retryBtn=ce('button',{style:{background:'#111',color:'#fff',border:'none',borderRadius:'13px',padding:'14px 30px',fontSize:'14px',fontWeight:'800',cursor:'pointer'},onclick:function(){S.qIdx=0;S.qScore=0;S.qCho=null;S.qDone=false;render();}},'Reessayer &#128260;');
      d.appendChild(retryBtn);
    }
    var backB=ce('button',{style:{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:'13px'},onclick:function(){S.screen='lmenu';render();}},'Retour');
    d.appendChild(backB);
    return d;
  }
  var w=lesson.words[qi];
  var opts=shuffle([w.en,...shuffle(lesson.words.filter(x=>x.en!==w.en)).slice(0,3).map(x=>x.en)]).slice(0,4);
  var d=ce('div',{style:{padding:'22px 14px',background:'#f8fafc',minHeight:'100vh'}});
  d.innerHTML='<button onclick="S.screen=\'lmenu\';S.qIdx=0;S.qScore=0;S.qCho=null;S.qDone=false;render();" style="background:none;border:none;color:#94a3b8;font-size:14px;cursor:pointer;padding:0;margin-bottom:4px">&#8592; Retour</button>';
  d.innerHTML+='<div style="margin:11px 0 13px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:#94a3b8">Quiz final</span><span style="font-size:11px;color:#94a3b8">'+(qi+1)+'/'+lesson.words.length+'</span></div>'+
    '<div style="height:4px;background:#e2e8f0;border-radius:99px"><div style="height:100%;width:'+(qi/lesson.words.length*100)+'%;background:'+lesson.color+';border-radius:99px;transition:width 0.3s"></div></div></div>'+
    '<div style="background:linear-gradient(135deg,#080810,#0f172a);border-radius:20px;padding:20px;text-align:center;margin-bottom:16px">'+
      '<div style="font-size:10px;color:#475569;margin-bottom:5px;letter-spacing:1px">TRADUIS EN AMERICAIN</div>'+
      '<div style="font-size:20px;font-weight:900;color:#fff">'+w.fr+'</div>'+
    '</div>';
  var grid=ce('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'9px'}});
  opts.forEach(function(c){
    var ok=c===w.en;
    var btn=ce('button',{style:{background:S.qCho?(ok?'#10b981':c===S.qCho?'#ef4444':'#f1f5f9'):'#fff',color:S.qCho&&(ok||c===S.qCho)?'#fff':'#111',border:'2px solid '+(S.qCho?(ok?'#10b981':c===S.qCho?'#ef4444':'#e2e8f0'):'#e2e8f0'),borderRadius:'13px',padding:'13px 7px',fontSize:'12px',fontWeight:'700',cursor:S.qCho?'default':'pointer',textAlign:'center',lineHeight:'1.3'},onclick:function(){
      if(S.qCho)return;
      S.qCho=c;tone(ok);
      if(ok){S.qScore++;speak(w.en,u.level.speed);}
      render();
      setTimeout(function(){
        if(qi+1>=lesson.words.length)S.qDone=true;
        else{S.qIdx++;S.qCho=null;}
        render();
      },1000);
    }},c);
    grid.appendChild(btn);
  });
  d.appendChild(grid);
  return d;
}

function showXPPopup(xp){
  var pop=ce('div',{style:{position:'fixed',inset:'0',background:'rgba(0,0,0,0.65)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:'9999'}});
  pop.innerHTML='<div style="background:linear-gradient(135deg,#080810,#0f172a);border:1px solid rgba(239,68,68,0.3);border-radius:26px;padding:40px 48px;text-align:center;animation:pop 0.4s ease">'+
    '<div style="font-size:52px">&#11088;</div>'+
    '<div style="font-size:32px;font-weight:900;color:#fff;margin:7px 0 3px">+'+xp+' XP</div>'+
    '<div style="color:#ef4444;font-size:13px;font-weight:700">Lecon validee!</div>'+
    '<div style="color:#475569;font-size:11px;margin-top:3px;font-style:italic">Sam est fier de toi</div>'+
  '</div>';
  document.body.appendChild(pop);
  setTimeout(function(){document.body.removeChild(pop);},2500);
}

// ============================================================
// START
// ============================================================
render();
</script>
</body>
</html>
